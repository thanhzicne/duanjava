<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phạm Đức Thành</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 60px 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        color: #333;
        font-size: 2.5rem;
        margin-bottom: 20px;
        font-weight: 700;
      }

      .welcome-text {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 30px;
      }

      .name-display {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        border-radius: 8px;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Xin chào</h1>
      <p class="welcome-text">Đây là ứng dụng của</p>
      <div class="name-display" th:text="${name}"></div>
    </div>
  </body>
</html>
